<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>भद्रावती शिक्षण संस्था, भद्रावती</title>
    <link href="https://fonts.googleapis.com/css2?family=Rozha+One&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #04070a; /* डीप निळा-काळा हाय-एंड बॅकग्राउंड */
            height: 100vh;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* बॅकग्राउंड ॲम्बिएंट सुवर्ण प्रकाश (Golden Glow Effect) */
        body::before {
            content: "";
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.04) 0%, transparent 70%);
            top: -10%; right: -10%;
            pointer-events: none;
        }

        /* --- MODERN SPLITTING RIBBON OVERLAY --- */
        .ribbon-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 9999;
            display: flex;
            overflow: hidden;
            pointer-events: auto;
        }

        /* प्रीमियम स्प्लिटिंग मॅट पॅनेल्स */
        .overlay-panel-left, .overlay-panel-right {
            width: 50%;
            height: 100%;
            background: linear-gradient(135deg, #0d1117 0%, #07090c 100%);
            position: absolute;
            top: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* संथ, मऊ आणि नॅचरल ओपनिंग गती (५.५ सेकंद) */
            transition: transform 5.5s cubic-bezier(0.25, 1, 0.3, 1);
            overflow: hidden;
        }

        .overlay-panel-left { left: 0; }
        .overlay-panel-right { right: 0; }

        /* स्वागत संदेश (सुवर्ण नक्षीदार लुक जो मधोमध विभागला जाईल) */
        .welcome-msg-half {
            font-family: 'Rozha One', serif;
            font-size: 4rem;
            background: linear-gradient(135deg, #fff3cd, #ffd700, #b8860b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
            position: absolute;
            top: 18%;
            width: 200%; 
            text-align: center;
            pointer-events: none;
            letter-spacing: 1px;
        }

        .overlay-panel-left .welcome-msg-half { left: 0; }
        .overlay-panel-right .welcome-msg-half { right: 0; }

        /* फित कॅनव्हास */
        .ribbon-canvas-container {
            position: absolute;
            width: 100%;
            height: 400px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        #ribbonCanvas {
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        /* --- क्लिक झाल्यावर पडदा दोन्ही बाजूंना उघडणे --- */
        .ribbon-overlay.is-cut-open .overlay-panel-left { transform: translateX(-100%); }
        .ribbon-overlay.is-cut-open .overlay-panel-right { transform: translateX(100%); }
        .ribbon-overlay.is-cut-open { pointer-events: none; }


        /* --- PREMIUM MAIN INTERFACE --- */
        .main-header {
            width: 100%;
            background: rgba(11, 15, 22, 0.7);
            backdrop-filter: blur(20px);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 2px solid rgba(255, 215, 0, 0.3); /* सुबक थिन गोल्ड बॉर्डर */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 5;
        }

        .main-header h1 {
            font-family: 'Rozha One', serif;
            font-size: 4.5rem; /* भव्य आणि विशाल मराठी नाव */
            background: linear-gradient(135deg, #ffffff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.6);
        }

        .grid-container {
            flex: 1;
            padding: 40px 50px;
            display: flex;
            gap: 40px;
            background: #04070a;
            overflow: hidden;
        }

        /* --- काचेसारखे पारदर्शक कन्सोल बॉक्सेस (Glassmorphic Neon Look) --- */
        .console-box {
            flex: 1;
            height: 100%;
            background: rgba(17, 24, 34, 0.3);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px; /* आधुनिक सुबक कडा */
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            cursor: pointer;
            position: relative;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* माउस फिरवल्यावर कडांना येणारा हलका निळा-सोनेरी निऑन ग्लो */
        .console-box::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 20px;
            padding: 1.5px;
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.15), transparent 50%, rgba(255, 215, 0, 0.15));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            transition: background 0.4s ease;
        }

        .console-box:hover {
            transform: translateY(-8px) scale(1.01);
            background: rgba(17, 24, 34, 0.5);
            box-shadow: 0 30px 60px rgba(0, 242, 254, 0.08);
        }

        .console-box:hover::before {
            background: linear-gradient(135deg, #00f2fe, transparent 50%, #ffd700);
        }

        /* वेबसाईट उघडण्यासाठी प्रॉम्ट हिंट */
        .console-box::after {
            content: "CLICK TO OPEN FULL SCREEN ⛶";
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            background: linear-gradient(to top, rgba(4, 7, 10, 0.95), transparent);
            padding: 24px 10px;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: #ffd700;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 10;
        }
        .console-box:hover::after { opacity: 1; }

        /* कन्सोल टॉप बार */
        .console-bar {
            background: rgba(22, 32, 45, 0.6);
            padding: 14px 24px;
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-dot-indicator {
            width: 7px;
            height: 7px;
            background: #00f2fe;
            border-radius: 50%;
            box-shadow: 0 0 10px #00f2fe;
        }

        /* मूळ डेस्कटॉप इंटरफेस बॉडी */
        .console-body {
            flex: 1;
            width: 100%;
            background: #ffffff;
            position: relative;
            overflow: hidden; 
            pointer-events: none; 
        }

        .web-frame {
            width: 1366px; 
            height: 2200px; 
            border: none;
            background: #ffffff;
            transform-origin: top left;
        }
    </style>
</head>
<body>

    <div class="ribbon-overlay" id="ribbonOverlay">
        
        <div class="overlay-panel-left">
            <div class="welcome-msg-half">भद्रावती शिक्षण संस्था, भद्रावती<br>मध्ये आपले स्वागत आहे</div>
        </div>

        <div class="overlay-panel-right">
            <div class="welcome-msg-half">भद्रावती शिक्षण संस्था, भद्रावती<br>मध्ये आपले स्वागत आहे</div>
        </div>
        
        <div class="ribbon-canvas-container">
            <canvas id="ribbonCanvas" onclick="triggerPhysicsCut()"></canvas>
        </div>
    </div>

    <div class="main-header">
        <h1>भद्रावती शिक्षण संस्था, भद्रावती</h1>
    </div>

    <div class="grid-container">
        
        <div class="console-box" onclick="window.open('https://www.yshindecollege.com', '_blank')">
            <div class="console-bar">
                <span>WWW.YSHINDECOLLEGE.COM</span>
                <div class="status-dot-indicator"></div>
            </div>
            <div class="console-body" id="wrap1">
                <iframe src="https://www.yshindecollege.com" class="web-frame" id="frame1" scrolling="no"></iframe>
            </div>
        </div>

        <div class="console-box" onclick="window.open('https://www.dvspsm.com', '_blank')">
            <div class="console-bar">
                <span>WWW.DVSPSM.COM</span>
                <div class="status-dot-indicator"></div>
            </div>
            <div class="console-body" id="wrap2">
                <iframe src="https://www.dvspsm.com" class="web-frame" id="frame2" scrolling="no"></iframe>
            </div>
        </div>

        <div class="console-box" onclick="window.open('https://www.knswarora.com', '_blank')">
            <div class="console-bar">
                <span>WWW.KNSWARORA.COM</span>
                <div class="status-dot-indicator"></div>
            </div>
            <div class="console-body" id="wrap3">
                <iframe src="https://www.knswarora.com" class="web-frame" id="frame3" scrolling="no"></iframe>
            </div>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('ribbonCanvas');
        const ctx = canvas.getContext('2d');

        let points = [];
        let segments = [];
        const numPoints = 60; 
        let isCut = false;
        let cutIndex = Math.floor(numPoints / 2);

        function initPhysics() {
            canvas.width = canvas.parentElement.offsetWidth;
            canvas.height = canvas.parentElement.offsetHeight;

            const startX = 0; 
            const endX = canvas.width;
            const startY = canvas.height / 2;
            const spacing = (endX - startX) / (numPoints - 1);

            for (let i = 0; i < numPoints; i++) {
                let x = startX + i * spacing;
                let y = startY + Math.sin((i / (numPoints - 1)) * Math.PI) * 35; 
                points.push({
                    x: x, y: y,
                    oldX: x, oldY: y,
                    isPinned: (i === 0 || i === numPoints - 1)
                });
            }

            for (let i = 0; i < numPoints - 1; i++) {
                segments.push({
                    p1: points[i],
                    p2: points[i + 1],
                    length: spacing
                });
            }
        }

        function updatePhysics() {
            const gravity = 0.12; 
            const friction = 0.94; 

            if (isCut) {
                const shiftSpeed = 4.5; 
                points[0].x -= shiftSpeed;
                points[numPoints - 1].x += shiftSpeed;
            }

            for (let i = 0; i < points.length; i++) {
                let p = points[i];
                if (p.isPinned) continue;

                let vx = (p.x - p.oldX) * friction;
                let vy = (p.y - p.oldY) * friction;

                p.oldX = p.x;
                p.oldY = p.y;

                p.x += vx;
                p.y += vy + gravity;
            }

            for (let j = 0; j < 16; j++) {
                for (let i = 0; i < segments.length; i++) {
                    let seg = segments[i];
                    let dx = seg.p2.x - seg.p1.x;
                    let dy = seg.p2.y - seg.p1.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    let diff = seg.length - dist;
                    let percent = (diff / dist) / 2;
                    let offsetX = dx * percent;
                    let offsetY = dy * percent;

                    if (!seg.p1.isPinned) { seg.p1.x -= offsetX; seg.p1.y -= offsetY; }
                    if (!seg.p2.isPinned) { seg.p2.x += offsetX; seg.p2.y += offsetY; }
                }
            }
        }

        function drawRibbon() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.lineWidth = 14; 
            ctx.strokeStyle = '#c0392b'; /* रेशमी मऊ लाल रंग */
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(0,0,0,0.5)';

            if (!isCut) {
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                for (let i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i].x, points[i].y);
                }
                ctx.stroke();
            } else {
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                for (let i = 1; i <= cutIndex; i++) {
                    ctx.lineTo(points[i].x, points[i].y);
                }
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(points[cutIndex + 1].x, points[cutIndex + 1].y);
                for (let i = cutIndex + 2; i < points.length; i++) {
                    ctx.lineTo(points[i].x, points[i].y);
                }
                ctx.stroke();
            }
        }

        function loop() {
            updatePhysics();
            drawRibbon();
            requestAnimationFrame(loop);
        }

        function triggerPhysicsCut() {
            if (isCut) return;
            isCut = true;

            const overlay = document.getElementById('ribbonOverlay');
            overlay.classList.add('is-cut-open');

            segments.splice(cutIndex, 1);

            points[cutIndex].oldX += 3;
            points[cutIndex].oldY += 5;
            points[cutIndex + 1].oldX -= 3;
            points[cutIndex + 1].oldY += 5;

            setTimeout(scaleFullDesktopLayout, 600);

            setTimeout(() => {
                overlay.style.display = 'none';
            }, 6000);
        }

        function scaleFullDesktopLayout() {
            const wrappers = ['wrap1', 'wrap2', 'wrap3'];
            const frames = ['frame1', 'frame2', 'frame3'];
            
            wrappers.forEach((wrapId, index) => {
                const wrapper = document.getElementById(wrapId);
                const frame = document.getElementById(frames[index]);
                
                if (wrapper && frame) {
                    const boxWidth = wrapper.offsetWidth;
                    const desktopBaselineWidth = 1366; 
                    const autoScaleFactor = boxWidth / desktopBaselineWidth;
                    
                    frame.style.width = desktopBaselineWidth + 'px';
                    frame.style.transform = `scale(${autoScaleFactor})`;
                }
            });
        }

        window.addEventListener('load', () => {
            initPhysics();
            loop();
            scaleFullDesktopLayout();
        });
        window.addEventListener('resize', () => {
            if(canvas && canvas.parentElement) {
                canvas.width = canvas.parentElement.offsetWidth;
                canvas.height = canvas.parentElement.offsetHeight;
            }
            scaleFullDesktopLayout();
        });
    </script>
</body>
</html>
